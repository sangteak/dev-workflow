<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 500" fill="none">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="680" y2="500">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="shadow3">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="680" height="500" rx="16" fill="url(#bg3)"/>

  <!-- Title -->
  <text x="340" y="40" text-anchor="middle" fill="#e2e8f0" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">세션 시작 프로토콜</text>
  <text x="340" y="60" text-anchor="middle" fill="#64748b" font-family="Segoe UI, Arial, sans-serif" font-size="12">매 세션 시작 시 자동으로 실행됩니다</text>

  <!-- Step 1 -->
  <g filter="url(#shadow3)">
    <rect x="40" y="84" width="600" height="48" rx="10" fill="rgba(245,158,11,0.1)" stroke="#f59e0b" stroke-width="1.5"/>
    <circle cx="72" cy="108" r="16" fill="#f59e0b"/>
    <text x="72" y="113" text-anchor="middle" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">1</text>
    <text x="100" y="104" fill="#fbbf24" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">페르소나 확정</text>
    <text x="100" y="122" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="11">현재 단계의 페르소나를 확정합니다 (브레인스토밍 / 계획)</text>
  </g>

  <!-- Connector -->
  <line x1="340" y1="132" x2="340" y2="148" stroke="#334155" stroke-width="2"/>
  <polygon points="334,148 340,158 346,148" fill="#334155"/>

  <!-- Step 2 -->
  <g filter="url(#shadow3)">
    <rect x="40" y="158" width="600" height="48" rx="10" fill="rgba(59,130,246,0.1)" stroke="#3b82f6" stroke-width="1.5"/>
    <circle cx="72" cy="182" r="16" fill="#3b82f6"/>
    <text x="72" y="187" text-anchor="middle" fill="#fff" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">2</text>
    <text x="100" y="178" fill="#60a5fa" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">HANDOFF 및 설계 문서 확인</text>
    <text x="100" y="196" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="11">세션 복구를 위한 HANDOFF.md 탐색 또는 기존 설계 문서 감지</text>
  </g>

  <!-- Connector -->
  <line x1="340" y1="206" x2="340" y2="222" stroke="#334155" stroke-width="2"/>
  <polygon points="334,222 340,232 346,222" fill="#334155"/>

  <!-- Step 3 -->
  <g filter="url(#shadow3)">
    <rect x="40" y="232" width="600" height="48" rx="10" fill="rgba(16,185,129,0.1)" stroke="#10b981" stroke-width="1.5"/>
    <circle cx="72" cy="256" r="16" fill="#10b981"/>
    <text x="72" y="261" text-anchor="middle" fill="#fff" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">3</text>
    <text x="100" y="252" fill="#34d399" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">VCS 감지</text>
    <text x="100" y="270" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="11">.git 존재 → git-mode (worktree)  |  .git 없음 → no-git-mode (파일 기반)</text>
  </g>

  <!-- Connector -->
  <line x1="340" y1="280" x2="340" y2="296" stroke="#334155" stroke-width="2"/>
  <polygon points="334,296 340,306 346,296" fill="#334155"/>

  <!-- Step 4 -->
  <g filter="url(#shadow3)">
    <rect x="40" y="306" width="600" height="48" rx="10" fill="rgba(139,92,246,0.1)" stroke="#8b5cf6" stroke-width="1.5"/>
    <circle cx="72" cy="330" r="16" fill="#8b5cf6"/>
    <text x="72" y="335" text-anchor="middle" fill="#fff" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">4</text>
    <text x="100" y="326" fill="#a78bfa" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">단계 감지</text>
    <text x="100" y="344" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="11">자동 감지: 브레인스토밍 / 계획 / 개발 / 리뷰 / 마무리</text>
  </g>

  <!-- Connector -->
  <line x1="340" y1="354" x2="340" y2="370" stroke="#334155" stroke-width="2"/>
  <polygon points="334,370 340,380 346,370" fill="#334155"/>

  <!-- Step 5 -->
  <g filter="url(#shadow3)">
    <rect x="40" y="380" width="600" height="48" rx="10" fill="rgba(236,72,153,0.1)" stroke="#ec4899" stroke-width="1.5"/>
    <circle cx="72" cy="404" r="16" fill="#ec4899"/>
    <text x="72" y="409" text-anchor="middle" fill="#fff" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">5</text>
    <text x="100" y="400" fill="#f472b6" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">단계 선언</text>
    <text x="100" y="418" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="11">감지된 단계 + 확정 페르소나를 선언한 뒤 진행합니다</text>
  </g>

  <!-- Connector -->
  <line x1="340" y1="428" x2="340" y2="444" stroke="#334155" stroke-width="2"/>
  <polygon points="334,444 340,454 346,444" fill="#334155"/>

  <!-- Step 6 -->
  <g filter="url(#shadow3)">
    <rect x="40" y="454" width="600" height="38" rx="10" fill="rgba(100,116,139,0.1)" stroke="#64748b" stroke-width="1"/>
    <circle cx="72" cy="473" r="14" fill="#475569"/>
    <text x="72" y="478" text-anchor="middle" fill="#e2e8f0" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700">6</text>
    <text x="100" y="478" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600">교훈 검토</text>
    <text x="196" y="478" fill="#64748b" font-family="Segoe UI, Arial, sans-serif" font-size="11">(내부 — tasks/lessons.md를 조용히 읽음)</text>
  </g>

</svg>