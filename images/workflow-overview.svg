    <text x="286" y="265" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="11">문서 분석</text>
  </g>
  <text x="314" y="292" text-anchor="middle" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="14">|</text>
  <g>
    <rect x="224" y="298" width="180" height="34" rx="8" fill="rgba(59,130,246,0.1)" stroke="#3b82f6" stroke-width="1"/>
    <text x="234" y="319" fill="#60a5fa" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="600">Step 2</text>
    <text x="286" y="319" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="11">미해결 질문 처리</text>
  </g>
  <text x="314" y="346" text-anchor="middle" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="14">|</text>
  <g>
    <rect x="224" y="352" width="180" height="34" rx="8" fill="rgba(59,130,246,0.1)" stroke="#3b82f6" stroke-width="1"/>
    <text x="234" y="373" fill="#60a5fa" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="600">Step 3</text>
    <text x="286" y="373" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="11">실현 가능성 평가</text>
  </g>
  <text x="314" y="400" text-anchor="middle" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="14">|</text>
  <g>
    <rect x="224" y="406" width="180" height="50" rx="8" fill="rgba(59,130,246,0.15)" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="234" y="427" fill="#60a5fa" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="600">Step 4</text>
    <text x="286" y="427" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="11">설계 방향 수립</text>
    <text x="234" y="445" fill="#64748b" font-family="Segoe UI, Arial, sans-serif" font-size="10">+ Superpowers writing-plans</text>
  </g>

  <!-- Detail: DEVELOP -->
  <text x="508" y="228" text-anchor="middle" fill="#10b981" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600">개발 모드</text>

  <g>
    <rect x="428" y="254" width="160" height="72" rx="8" fill="rgba(16,185,129,0.1)" stroke="#10b981" stroke-width="1"/>
    <text x="508" y="278" text-anchor="middle" fill="#34d399" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600">git-mode</text>
    <text x="508" y="298" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="10">worktree +</text>
    <text x="508" y="314" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="10">서브에이전트 구현</text>
  </g>

  <g>
    <rect x="428" y="342" width="160" height="72" rx="8" fill="rgba(16,185,129,0.1)" stroke="#10b981" stroke-width="1"/>
    <text x="508" y="366" text-anchor="middle" fill="#34d399" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600">no-git-mode</text>
    <text x="508" y="386" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="10">파일 기반 체크포인트</text>
    <text x="508" y="402" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="10">서브에이전트 구현</text>
  </g>

  <!-- Detail: REVIEW -->
  <text x="702" y="228" text-anchor="middle" fill="#8b5cf6" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600">리뷰</text>

  <g>
    <rect x="622" y="254" width="160" height="56" rx="8" fill="rgba(139,92,246,0.1)" stroke="#8b5cf6" stroke-width="1"/>
    <text x="702" y="278" text-anchor="middle" fill="#a78bfa" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="600">코드 품질</text>
    <text x="702" y="296" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="10">Superpowers 코드 리뷰</text>
  </g>

  <g>
    <rect x="622" y="322" width="160" height="56" rx="8" fill="rgba(139,92,246,0.1)" stroke="#8b5cf6" stroke-width="1"/>
    <text x="702" y="346" text-anchor="middle" fill="#a78bfa" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="600">스펙 적합성</text>
    <text x="702" y="364" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="10">설계 문서 vs 코드</text>
  </g>

  <!-- Detail: COMPLETION -->
  <text x="871" y="228" text-anchor="middle" fill="#ef4444" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600">마무리</text>

  <g>
    <rect x="816" y="254" width="110" height="34" rx="8" fill="rgba(239,68,68,0.1)" stroke="#ef4444" stroke-width="1"/>
