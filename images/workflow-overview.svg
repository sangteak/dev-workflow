    <rect x="816" y="80" width="110" height="64" rx="12" fill="url(#completion)"/>
    <text x="871" y="105" text-anchor="middle" fill="#fff" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">마무리</text>
    <text x="871" y="128" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-family="Segoe UI, Arial, sans-serif" font-size="11">dev-workflow</text>
  </g>

  <!-- Persona badges -->
  <rect x="60" y="152" width="120" height="24" rx="12" fill="rgba(245,158,11,0.2)" stroke="#f59e0b" stroke-width="1"/>
  <text x="120" y="168" text-anchor="middle" fill="#fbbf24" font-family="Segoe UI, Arial, sans-serif" font-size="10">페르소나 활성</text>

  <rect x="254" y="152" width="120" height="24" rx="12" fill="rgba(59,130,246,0.2)" stroke="#3b82f6" stroke-width="1"/>
  <text x="314" y="168" text-anchor="middle" fill="#60a5fa" font-family="Segoe UI, Arial, sans-serif" font-size="10">페르소나 활성</text>

  <!-- Divider -->
  <line x1="40" y1="200" x2="920" y2="200" stroke="#334155" stroke-width="1"/>

  <!-- Detail: BRAINSTORM Phases -->
  <text x="120" y="228" text-anchor="middle" fill="#f59e0b" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600">브레인스토밍 단계</text>

  <g>
    <rect x="30" y="244" width="180" height="34" rx="8" fill="rgba(245,158,11,0.1)" stroke="#f59e0b" stroke-width="1"/>
    <text x="40" y="265" fill="#fbbf24" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="600">Phase 0</text>
    <text x="96" y="265" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="11">카테고리</text>
  </g>
  <text x="120" y="292" text-anchor="middle" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="14">|</text>
  <g>
    <rect x="30" y="298" width="180" height="34" rx="8" fill="rgba(245,158,11,0.1)" stroke="#f59e0b" stroke-width="1"/>
    <text x="40" y="319" fill="#fbbf24" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="600">Phase 1</text>
    <text x="96" y="319" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="11">탐색</text>
  </g>
  <text x="120" y="346" text-anchor="middle" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="14">|</text>
  <g>
