    <text x="40" y="373" fill="#fbbf24" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="600">Phase 2</text>
    <text x="96" y="373" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="11">발견</text>
  </g>
  <text x="120" y="400" text-anchor="middle" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="14">|</text>
  <g>
    <rect x="30" y="406" width="180" height="34" rx="8" fill="rgba(245,158,11,0.1)" stroke="#f59e0b" stroke-width="1"/>
    <text x="40" y="427" fill="#fbbf24" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="600">Phase 3</text>
    <text x="96" y="427" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="11">검증</text>
  </g>
  <text x="120" y="454" text-anchor="middle" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="14">|</text>
  <g>
    <rect x="30" y="460" width="180" height="34" rx="8" fill="rgba(245,158,11,0.15)" stroke="#f59e0b" stroke-width="1.5"/>
