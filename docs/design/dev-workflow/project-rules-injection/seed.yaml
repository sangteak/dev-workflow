seed:
  meta:
    feature: project-rules-injection
    category: dev-workflow
    version: 1.0.0
    semver_impact: MINOR
    ambiguity_score: 0.08
    open_questions: []

  goal: ".claude/rules/*.md 프로젝트 규칙을 SessionStart 훅·단계별 프롬프트 주입·REVIEW 검증자 라우팅의 3계층 Defense in Depth로 자동 주입·전파·검증하여 CLAUDE.md 비대화를 방지하고, dev-workflow의 5단계 워크플로우와 후방 호환을 유지한 채 MINOR 버전으로 통합한다."

  goals:
    - id: GOAL-001
      description: ".claude/rules/*.md 자동 주입·전파·검증을 위한 3계층 Defense in Depth 메커니즘 구축"
      verifiable: true
    - id: GOAL-002
      description: "CLAUDE.md 비대화 방지 - 규칙을 별도 파일로 분리하여 컨텍스트 부담 완화"
      verifiable: true
    - id: GOAL-003
      description: "워크플로우 단계별 적시 강조 - DEVELOP/REVIEW/COMPLETION/PLAN 진입 시점에 해당 단계 규칙만 활성화"
      verifiable: true
    - id: GOAL-004
      description: "자동 수정 안전망 - 별도 커밋·테스트 재실행·실패 시 자동 롤백 제공"
      verifiable: true
    - id: GOAL-005
      description: "후방 호환 유지 - 기존 사용자 프로젝트의 docs/design 구조와 5단계 워크플로우 무변경"
      verifiable: true

  constraints:
    - "코드 없는 Markdown 스킬 플러그인 형식 유지 (skills/*/SKILL.md 기반)"
    - "5단계 워크플로우(Brainstorm → Plan → Develop → Review → Completion) 구조 변경 금지"
    - "Superpowers 위임 패턴 유지 (DEVELOP/REVIEW 단계)"
    - "SessionStart 훅은 additionalContext 필드만 사용 (v1)"
    - "서브에이전트 컨텍스트 비상속을 고려해 규칙은 프롬프트에 명시 첨부"
    - "MAJOR 버전 업 금지 - MINOR 범위 내 변경만 허용"
    - "기존 orchestrator 훅과 inject-rules 훅을 분리해 단일 책임 유지"
    - "BRAINSTORM 단계에는 규칙 적용 금지"
    - "신규 6번째 워크플로우 단계 추가 금지"
    - "pre-commit git hook 강제 금지"
    - "헤더 단위 라우팅·priority 필드·별도 메타 파일(.claude/dev-workflow.yaml) 도입 금지"
    - "자동 CLAUDE.md 마이그레이션 금지 - 가이드 문서만 제공"

  acceptance_criteria:
    - "SessionStart 시 hooks/inject-rules가 실행되어 .claude/rules/*.md를 로드하고 한 줄 관측 로그(로드된 규칙 개수 + 파일명)를 출력한다"
    - "examples/ 서브디렉토리는 글로브에서 자동 제외된다 (*.md 평면 패턴, ** 재귀 금지)"
    - "frontmatter 필수 필드(type / applies-to / auto-fix)가 누락된 규칙은 경고 후 스킵된다"
    - "applies-to 값이 develop, review, completion, plan, all 중 하나여야 하며, 그 외 값은 무시된다"
    - "DEVELOP 진입 시 applies-to: develop|all 규칙이 Superpowers Implementer 프롬프트에 명시 첨부된다"
    - "REVIEW 진입 시 type: semantic 규칙은 Superpowers code-reviewer로, type: quantitative|structural 규칙은 Ouroboros Evaluator로 라우팅된다"
    - "PLAN 진입 시 applies-to: plan|all 규칙이 Ouroboros Architect 프롬프트에 첨부된다"
    - "COMPLETION 진입 시 applies-to: completion|all 규칙이 활성화된다"
    - "Ontologist/Socratic/Contrarian/Simplifier/Hacker/Researcher 에이전트에는 규칙이 전파되지 않는다"
    - "단계 진입 라벨에 활성 규칙 목록 한 줄이 출력된다"
    - "auto-fix: true 규칙 위반 시 별도 커밋으로 자동 수정 → 테스트 재실행 → 실패 시 자동 롤백 + 변경 diff와 실패 테스트명 보고가 수행된다"
    - "규칙 간 충돌은 감지·알림만 하고 사용자 결정에 위임한다 (자동 해결 금지)"
    - "dev-workflow:setup 커맨드가 빈 디렉토리 / 스킵 / 샘플 포함 옵션을 질문하고, 샘플 선택 시 examples/coding_style.md, examples/commit_conventional.md, examples/review_checklist.md 3종을 생성한다"
    - "CLAUDE.md 마이그레이션 가이드 문서가 docs/ 또는 README에 제공된다"
    - "CLAUDE.md에 ## Test Command 섹션 가이드가 강화되어 Implementer 테스트 명령 인지를 보조한다"
    - "기존 dev-workflow 사용자 프로젝트의 docs/design/ 구조와 5단계 흐름이 변경 없이 동작한다 (후방 호환)"
    - "marketplace.json과 plugin.json 버전이 MINOR 단위로 동기화되어 함께 상승한다"

  ontology:
    name: ProjectRulesInjection
    description: ".claude/rules/*.md 파일을 SessionStart부터 단계별 프롬프트, REVIEW 검증자까지 3계층으로 전파·검증하는 메커니즘의 도메인 모델"
    fields:
      - name: rule_file_path
        type: string
        description: "규칙 파일 경로 (.claude/rules/*.md, examples/ 제외)"
      - name: type
        type: string
        description: "검증 유형 - semantic | quantitative | structural (REVIEW 라우팅 결정)"
      - name: applies_to
        type: array
        description: "적용 단계 - develop, review, completion, plan, all 중 하나 이상 (BRAINSTORM 제외)"
      - name: auto_fix
        type: string
        description: "자동 수정 모드 - true | false | confirm"
      - name: domain_prefix
        type: string
        description: "파일명 도메인 prefix (예: coding_, commit_, review_)"
      - name: body_content
        type: string
        description: "규칙 본문 (자유 형식, 권장 템플릿 존재하나 강제 안 함)"
      - name: target_agents
        type: array
        description: "전파 대상 에이전트 - Implementer, code-reviewer, Evaluator, Architect 중 단계별 매핑"
      - name: load_status
        type: string
        description: "로드 상태 - loaded | skipped_invalid_frontmatter | conflict_detected"
      - name: observability_label
        type: string
        description: "단계 진입 시 출력되는 활성 규칙 목록 한 줄 라벨"

  evaluation_principles:
    - name: defense_in_depth
      description: "3계층(SessionStart 훅 / 단계별 프롬프트 / REVIEW 검증자) 중 하나가 실패해도 다른 계층이 규칙을 강제하는지"
      weight: 0.20
    - name: backward_compatibility
      description: "기존 사용자 프로젝트 docs/design 구조와 5단계 워크플로우가 마이그레이션 없이 동작하는지"
      weight: 0.20
    - name: stage_targeting_accuracy
      description: "applies-to에 따라 정확한 단계·에이전트에만 규칙이 전파되는지 (BRAINSTORM 제외 준수)"
      weight: 0.15
    - name: auto_fix_safety
      description: "자동 수정이 별도 커밋·테스트 재실행·실패 시 롤백·사용자 보고 사이클을 완전히 수행하는지"
      weight: 0.15
    - name: observability
      description: "SessionStart 한 줄 + 단계 진입 라벨 한 줄로 사용자가 활성 규칙을 즉시 파악할 수 있는지"
      weight: 0.10
    - name: convention_simplicity
      description: "평면 디렉토리 + 도메인 prefix + frontmatter 3필드 규약이 학습 부담 없이 단순한지"
      weight: 0.10
    - name: non_goal_discipline
      description: "신규 단계·priority 필드·별도 메타 파일·헤더 라우팅 등 비목표를 도입하지 않았는지"
      weight: 0.10

  exit_conditions:
    - name: three_layer_mechanism_operational
      description: "SessionStart 훅, 단계별 프롬프트 주입, REVIEW 검증자 라우팅 3계층이 모두 동작"
      criteria: "hooks/inject-rules 로그 확인 + DEVELOP/PLAN 프롬프트 첨부 확인 + REVIEW type별 라우팅 테스트 통과"
    - name: stage_routing_verified
      description: "applies-to v1 범위(develop, review, completion, plan, all)에 따른 단계 라우팅이 정확하며 BRAINSTORM은 제외됨"
      criteria: "각 단계별 활성 규칙 목록 라벨이 기대값과 일치, BRAINSTORM 진입 시 규칙 미주입 확인"
    - name: agent_propagation_correct
      description: "Implementer/code-reviewer/Evaluator/Architect 4개 에이전트에만 전파되고 나머지는 전파되지 않음"
      criteria: "각 에이전트 프롬프트 검사 + Ontologist/Socratic/Contrarian/Simplifier/Hacker/Researcher 미주입 확인"
    - name: auto_fix_cycle_complete
      description: "자동 수정 사이클(별도 커밋 → 테스트 → 실패 시 롤백 + 보고)이 end-to-end 동작"
      criteria: "auto-fix: true 규칙으로 위반 시나리오 테스트 → 커밋 생성, 테스트 실패 유도 시 롤백 + diff/실패 테스트명 보고 확인"
    - name: setup_automation_ready
      description: "dev-workflow:setup 커맨드가 빈/스킵/샘플 옵션과 examples 3종 샘플을 제공"
      criteria: "setup 실행 시 3가지 옵션 프롬프트 + 샘플 선택 시 coding_style/commit_conventional/review_checklist 생성 확인"
    - name: backward_compat_proven
      description: "기존 dev-workflow 사용자 프로젝트가 변경 없이 동작하고 버전이 MINOR로 상승"
      criteria: "기존 docs/design 구조 회귀 테스트 통과 + marketplace.json/plugin.json MINOR 동기화 확인"
    - name: documentation_published
      description: "CLAUDE.md 마이그레이션 가이드와 ## Test Command 섹션 강화가 공개됨"
      criteria: "마이그레이션 가이드 문서 존재 확인 + CLAUDE.md 템플릿에 Test Command 섹션 반영 확인"
