goal: "브레인스토밍·계획 단계 출력 규범 개편 — 결정 요청을 자기완결형(4요소)으로, 페르소나 발언을 생산 규격+원문 나열+본체 검증 주석 구조로 바꿔 미검증 가정이 팩트처럼 출력되는 것을 차단하고, 소비자 피드백 루프로 규범 조정을 닫는다"
constraints:
  - "결정 박스 4요소: 다루는 문제 / 확인된 사실 / 확인 못 한 것 / 토론 요지 — 출신 2등급 (토론·조사 선행=4칸 상시·빈 칸 '없음' 명시 / 표준 결정=문제 칸 필수+이력 칸 / 로컬 템플릿·게이트=기존 유지), 판정은 기계적 술어만"
  - "발언 생산 규격: 결론 1줄 + 근거 불릿 3 이내 + 전제 반박 1, 전치 태그, 부족 사유 1줄 탈출구"
  - "전달: 본체 고쳐 쓰기 금지 — 원문 나열 + ↳ 단독 마커 주석 (반증·확인 불가 승격·새 사실 시에만), 위반 시 재실행 1회(가시화), 재위반 시 발언 제외+고지"
  - "검증: 출처 3종 (계산 / 프로젝트 내 코드·문서 / 외부 공식 문서), 태그 전치, 세션 최초 [✔] 뜻 고지"
  - "관문: '미확인+결정 근거' 주장만 본체 재확인, [✔]는 증거 대조, 규약 '화면의 [✔]=관문 통과', 관문 주체 본체 고정"
  - "근거 첨부 의무: 프로젝트 내=경로+행/인용, 외부=워커 인용 첨부, 없으면 미확인 강등(가시화)"
  - "선별 침묵: 결정 영향 있는 확인 불가만 ⚠️ 승격, 나머지 추측 미출력"
  - "피드백 루프: 소비 프로젝트당 관측 파일 1개(1줄 서식·수동) + 세션 시작 검토 포함(부재 시 스킵) + feedback 명령(이슈 초안 텍스트까지만)"
  - "언어 규범 보강: 절 기호 등 법조문식 표기 금지(말로 풀어 쓰기), 슬래시 압축 금지를 중계·요약까지 확대"
  - "압축 생존: 등급 판정 근거·재실행 이력·관문 이력을 상태 보존 절에 등재"
  - "배치: decision-flow.md 원본 편입 + 신설 상세 references 분리, 스윕 목록 사전 확정(서브에이전트 출력 재구성 책임 절 포함), sweep+bump-version --check 릴리스 게이트"
non_goals:
  - "상시 진행 지도"
  - "자동 검사·수집 장치 (런타임 훅·자동 로그) — 필요 시 릴리스 시점 검사로"
  - "확인 불가 가정의 전부 침묵"
  - "본체의 발언 고쳐 쓰기 (재논의로 기각)"
  - "실질성 규칙 재설계, phase 파일 기록 방식 변경"
success_criteria:
  - "결정 요청 화면 하나만 읽고 추가 스크롤 없이 판단 가능 (해당 등급에서 4요소 존재)"
  - "페르소나 발언이 생산 규격을 지키고 벽 텍스트가 기본 출력에 없음"
  - "화면의 모든 근거에 전치 태그 존재 — 무표시 단정 0"
  - "'미확인+결정 근거' 주장에 본체 재확인 흔적 존재"
  - "decision-flow.md 개정이 블라인드 규범과 모순 없이 공존 (재구성 책임 절 교체 포함, 구 문구 잔존 0)"
  - "기존 한 줄 진행 헤더 동작 유지"
  - "관측 파일·feedback 명령이 소비 프로젝트에서 동작 (부재 시 무소음)"
assumptions:
  - "생산 규격을 페르소나가 대체로 준수 (재실행 1회 안전망, 세션 실측 4회 지지)"
  - "본체 인용 대조·단건 열람 비용 수용 가능 (세션 실측)"
  - "규격은 지시문 한 문단 요약 가능 수준 유지 (자동 검사기 부재 전제)"
open_questions: []
context: "실사용 세션에서 확인된 맥락 유실·미검증 가정 문제를 decision-flow.md 중심 규범 개정으로 해소. 검증 국면 3인 판정: 빨간불 0·노란불 5 — 가이드라인 전량 수용. 버전 목표 MINOR. 이 브레인스토밍 세션 자체가 새 규범의 라이브 실증"
