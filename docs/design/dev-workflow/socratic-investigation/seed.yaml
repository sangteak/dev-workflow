goal: >
  소크라틱 인터뷰 질문 목록 제시 후, 사용자가 답변하지 않은 질문에 대해 서브에이전트가
  코드베이스/설계 문서를 조사하여 잠정 답변을 제공함으로써 사용자의 직접 답변 부담을 줄인다.

constraints:
  - "Ouroboros 서브에이전트 정의(역할·프롬프트 구조) 변경 불가"
  - "자율 질문 필터링/자기해소 금지 — 미답변 질문만 조사 대상이 되며, 사용자가 답변 여부로 통제"
  - "미답변 질문에 대해 즉시 조사하지 않고 확인 단계를 거침 — 미답변 의도(조사/유보/무관) 구분"
  - "서브에이전트 사전 컨텍스트 주입 금지 — 앵커링 편향 방지"
  - "조사 서브에이전트는 메인 컨텍스트가 아닌 별도 서브에이전트로 실행"
  - "조사 결과는 확정이 아닌 잠정 답변으로 제시 — 사용자 최종 확인 필수"
  - "수정 대상: brainstorming SKILL.md의 통합/정제 파이프라인 섹션 + Step A-0 후속 처리"
  - "Step A-0(Ontologist) 질문에도 동일한 미답변 조사 패턴을 적용 — 단, A-0 출력 직후 1회만"
  - "Standalone Mode에서는 서브에이전트 대신 메인 컨텍스트에서 직접 조사"
  - "조사 결과 제시는 2-pass 방식 — 직접 답변 반영 먼저, 조사 결과 별도 블록으로 후속 제시"

non_goals:
  - "Ouroboros 에이전트 역할 정의 변경"
  - "서브에이전트 프롬프트 구조 변경"
  - "조사 대상 질문의 자동 선별/분류"
  - "서브에이전트에 코드베이스 컨텍스트 사전 주입"
  - "조사 기능의 강제 실행 — 사용자는 모든 질문에 직접 답변하는 방식도 선택 가능"

acceptance_criteria:
  - "사용자가 답변하지 않은 질문에 대해 확인 후 조사를 진행한다 (미답변 → 확인 → 조사)"
  - "지정된 질문에 대해 서브에이전트가 docs/design 우선, 코드베이스 차선으로 조사한다"
  - "조사 결과는 자유 응답 형태로 확인을 받는다 — 수정이 필요하면 사용자가 코멘트, 없으면 확정"
  - "사용자가 조사 결과에 이의를 제기하면 재조사 또는 사용자 직접 답변으로 교체할 수 있다"
  - "사용자의 직접 답변을 먼저 반영한 후, 미답변 질문에 대한 조사 결과를 별도 블록(2-pass)으로 제시한다"
  - "질문 제시 시 안내 문구로 '답변할 수 있는 질문에 답해 주세요. 답변하지 않은 질문은 코드/문서 조사를 진행합니다'를 포함한다"
  - "모든 질문에 직접 답변하면 조사 단계가 자동으로 스킵된다"
  - "사용자가 조사를 전혀 지정하지 않고 모든 질문에 직접 답변해도 워크플로우가 정상 동작한다"
  - "기존 brainstorming Phase 0~3 흐름이 그대로 동작한다"
  - "Step A-0(Ontologist) 질문에도 미답변 조사가 동일하게 동작한다"
  - "Standalone Mode(Ouroboros 미설치)에서도 조사 기능이 메인 컨텍스트 직접 조사로 동작한다"

open_questions: []

context: >
  dev-workflow는 코드 없는 문서 기반 Claude Code 플러그인.
  소크라틱 인터뷰 서브에이전트는 Ouroboros 기반으로 동작하며,
  현재는 코드베이스 컨텍스트 없이 순수 요건 추출 목적으로만 질문을 생성한다.
  이번 기능은 질문 생성 단계가 아닌, 질문 제시 후 사용자 응답 단계에서
  선택적 코드/문서 조사 루프를 추가하는 것이다.
  사용자 지정(user-directed) 방식을 채택하여 허위 신뢰(false-confidence) 위험을 차단한다.
