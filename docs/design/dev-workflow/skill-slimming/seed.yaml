goal: "증명된 축자 중복은 삭제하고, 기준값(본문 15KB 이상 + 참조 자료 분리 가능 구조) 충족 대형 스킬의 참조 자료는 verbatim 분할하여, 행동 등가성을 유지한 채 스킬의 invoke당 로드 비용을 절감한다 (G4, v1.13.0)."

constraints:
  - "다중 모델 지원 (하드): Fable 5 전용 최적화 금지 — 분리 파일 Read 지시는 디스패치 지점마다 명시"
  - "diff 허용 연산은 삭제·verbatim 이동·참조 삽입만 — 신규 규범 문장은 승인 목록 경유 (현재 공란)"
  - "사용자 노출 출력 템플릿은 F1 화이트리스트 외 바이트 보존"
  - "분리 파일 경로는 스킬 base dir 상대 references/ — 리포 상대 경로 금지 (v1.10.0 교훈)"
  - "작업 순서 강제: 베이스라인 인벤토리 추출 → 압축/분할 → 기계 체크 → 판단 리뷰"
  - "decision-flow.md·development-principles 무변경 (탈락 확정)"
  - "status 정정은 별도 커밋 (음성 불변식 순수성)"

non_goals:
  - "디스크 KB 수치 목표 / 재작성형 압축 / 기준 미달·일체형 파일 분할 / 경로 해소 참조화 / 스킬 병합 / 인벤토리 상시 린트화"

success_criteria:
  - "REQ-001: brainstorming 분할 — 템플릿·긴 예시 references/ 이동, 디스패치 지점 Read 지시+앵커 잔존"
  - "REQ-002: merge-to-domain 분할 — 5단계 상세·옵션·호환성 체크리스트 분리"
  - "REQ-003: /compact 3중 블록 → 확정 문면 1줄 × 3국면"
  - "REQ-004: 상태 정규화 → silent-fix 1줄 × 2파일 (문자 동일, 순서 문구 잔존)"
  - "REQ-005: Evaluator/AC 인라인 간소화 — D 최소 필드·스킵 가드 2개·실행 순서 잔존"
  - "REQ-006: 박스 통일 — F1 화이트리스트 한정"
  - "REQ-007: status 정정 별도 커밋 (머지는 별도 세션)"
  - "REQ-008: 3튜플 불변식 기계 체크 전수 통과 + 판단 리뷰 1회 통과 (인벤토리는 G4 후 폐기)"
  - "REQ-009: 음성 불변식 감사 통과 — 승인 목록 외 신규 규범 0건"

assumptions:
  - "분리 파일 Read 지시를 약한 모델도 따른다 (base dir 명시 + 지점별 지시 — 도그푸딩 관측 대상)"
  - "/compact 안내 축소가 UX를 저해하지 않는다 (사용자 증언 기반)"

open_questions: []

context: "2026-07-07 Fable5 리뷰 G4 권고에서 출발. 브레인스토밍 국면 0~4에서 목표 재정의(디스크 KB→invoke당 로드 비용), 재작성형 전량 기각, progressive-disclosure 기각→사용자 번복→임계값 분할 채택, 검증 이원화(3튜플 기계 체크+판단 리뷰) 확정. 상세: skill-slimming.md 및 phase1~3."
