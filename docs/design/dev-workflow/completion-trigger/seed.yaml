goal: "dev-workflow의 Completion Protocol이 개발 종료 후 스킵되지 않도록, 미완료 상태의 지속 가시화(경고등)와 마무리 발화 시 스킬 라우팅 신뢰성을 함께 확보한다."
constraints:
  - "deny형(무조건 차단) 훅 사용 불가 — 모든 개입은 주입형, 오탐 시 사용자 우회 수단 동반"
  - "마무리 시점의 최종 결정권은 사용자 — LLM의 자의 확정·자동 실행 금지 (핵심 원칙: 완료는 사용자가 선언하는 사건)"
  - "'완료 도달' 기계 판정 불가 — plan.md는 외부 산출물이라 bash 기계 파싱 의존 금지, LLM 파일 읽기 판단만 허용"
  - "문서 기반 플러그인 구조 유지"
  - "statusline 신규 설치 제안 금지 — 기존 사용자에게만 opt-in 통합 제안"
  - "bootstrap 강화는 명령형 교체만 — 수사 격화 금지, 주입 총량 증가 최소화"
non_goals:
  - "Completion Protocol 내부 단계 재설계 (문제는 내용이 아니라 진입 실패)"
  - "완료 시점의 시스템 판단·자동 실행 일체 — PR 머지 감지·소비 시점 검증·pr 참조 기록 포함 (핵심 원칙의 일관 적용)"
  - "무조건 차단형 게이트"
  - "Superpowers plan.md 형식 규정화"
success_criteria:
  - "미완료 상태(파일 술어 기준)가 회색 지대의 일단락 출력마다 가시화된다"
  - "마무리 어휘 발화 시 훅이 발동해 판정 위임형 지시가 주입된다 (회귀 테스트 6+1종 통과)"
  - "/dev-workflow:finish가 Completion Protocol 전문을 직접 Read하여 직행한다"
  - "모든 개입은 주입형 — 차단 지점 0, 오탐 시 사용자 우회 경로 존재"
  - "성공 마무리마다 진입 경로 1줄이 프로토콜 Step으로 기록된다"
assumptions:
  - "플러그인 hooks.json에 UserPromptSubmit 등록 가능 — REQ-010 스모크 테스트가 구현 첫 태스크 (실패 시 축3·4만으로 운영)"
  - "주입 후 LLM 라우팅 성공 — 오프라인 검증 불가, 도입 후 관측(REQ-009)으로 판정"
  - "'미완료' 기계 감지(plan.md/HANDOFF find 검사)는 신뢰 가능"
open_questions: []
context: >
  마무리 질문은 DEVELOP 종료 시 1회 발화 이벤트라 이슈 처리로 흐름을 벗어나면 재무장 계기가 없고,
  "마무리하자" 발화조차 LLM이 Completion Protocol로 라우팅하지 않는 실패가 실관측됨 (놓치는 주체는 LLM).
  해법은 4축 방어: ①UserPromptSubmit 조건부 정밀 주입 훅(잔존∧어휘→판정 위임형 지시)
  ②경고등(파일 술어 기반 🔔 규범 줄 + 기존 statusline 사용자 한정 opt-in)
  ③/dev-workflow:finish command(Completion Protocol을 references로 분리해 직접 Read — 직행의 구조적 보장)
  ④bootstrap COMPLETION 매핑 명령형 강화.
  관통 규율: LLM 기억·규범 준수를 저장소나 실행 보장으로 쓰지 않는다.
  확장 카드: Stop 훅 경고등 (규범 누락 실측 시 재검토).
