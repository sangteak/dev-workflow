> Step B 확정 시드에 국면 2~4 변경분(결정 원장 14건·검증 가이드라인)을 반영한 최종본. PLAN 단계·문서 취합의 참조 자료.

goal: "dev-workflow 플러그인의 페르소나 발언을 초보자도 읽을 수 있는 일상어로 바꾸고(문단 개행 포함), 토론의 실질성·독립성을 지시문 수준에서 강화하며, 감사에서 확인된 문서·스킬 사이의 어긋난 내용을 바로잡는다."

constraints:
  - "고치는 범위는 지시문과 문서 정비까지만 한다 — 프로그램 코드로 형식을 자동 검사하는 장치(훅/MCP)는 만들지 않는다."
  - "페르소나에 씌우는 사고 제약 원문(영어, agent-roles.md 3개 파일)은 바이트 불변 — 번역·수정·버전 교체 금지 (설치본 0.39.0과 드리프트 0 확인)."
  - "언어 규범은 원본 1곳(decision-flow 3부 「언어 규범」 5줄 펜스) + 실행 시점 복제 구조 — 정적 사본 금지."
  - "기존 설계 원칙(REQ-005: 완충 지시는 원문 블록이 아니라 프롬프트 쪽 래핑, 출력 형식은 전량 자체 템플릿 소유)과 정합 유지."
  - "쉽게 쓴다 = 어려운 한자어·전문 용어·줄임말을 일상어로 + 문단 개행. 비유 강제가 아니다."
  - "토론 구조(라운드 로빈·최대 3라운드)와 사용자의 중간 개입 참여 방식은 유지한다."
  - "DEVELOP/REVIEW 본 흐름에 페르소나를 넣지 않는 경계 유지 — 유일 예외: 이슈 카드 분석 확인 지점의 PLAN 세트 관점 1줄."
  - "도메인 문서(ux-consistency.md) 교정은 직접 수정하지 않고 설계 문서 §6 supersede 지정(원문 문장 인용) → merge-to-domain 경유로만 반영한다."

non_goals:
  - "형식만 기계 검사하는 훅/MCP 도입."
  - "MCP 기반 페르소나 관리·발전 기능 (미래 방향 기록만)."
  - "전원·전라운드 페르소나 독립 서브에이전트화 (블라인드 첫 라운드로 대체 확정)."
  - "DEVELOP/REVIEW 본 흐름 페르소나 토론 추가."
  - "사고 제약 원문의 수정·번역·버전 교체."
  - "만장일치 경보 — 관측 후 재고 후보로만 기록."

success_criteria:
  - "언어 규범 펜스(5요소: 한국어·일상어·용어 즉석 풀이·줄임말 금지·문단 개행)가 페르소나 발언 전 경로에 적용 — 적용 경로 목록 기준 누락 0 (실측 9곳 + 신설 블라인드 프롬프트)."
  - "발언 실질성 규칙(대상 중립 근거 병기·새 기여 의무·기본값 반전·[의견 없음] 센티널)이 기존 「출력 형식」 절의 재서술로 반영 — 상충 규범 공존 0."
  - "블라인드 첫 라운드가 판정 라운드 상시 + 발산 국면당 첫 루프로 규정되고, 발췌 규격(사용자 발화 원문+시드 절+기확정 결정 재론 금지)·원문 나열 취합·순서 회전·§7 예외가 문면화."
  - "ux-consistency.md의 60:40 문장·토론 리드 문단이 설계 문서 §6에 supersede 지정으로 기록 (반영은 머지 시점)."
  - "기본 페르소나 표 원본이 persona-resolution 1곳 — README 2곳은 예시 강등, TD 표기 통일."
  - "HANDOFF 확정된 페르소나 섹션이 단계명 반복 형식 + 복구 규칙이 context-handling·persona-resolution 양쪽 동일 표현."
  - "이슈 카드 확인 문구에 PLAN 세트 관점 1줄 규칙 + personas.md 부재 시 생략 + 'DEVELOP 페르소나 없음' 재서술 전수 스윕(스킬·README·CLAUDE.md) 잔존 0."
  - "'블라인드 일치는 약한 신호' 문장과 lessons.md 관측 고리가 문면에 존재."

assumptions:
  - "발언 난이도의 근본 원인은 프롬프트의 문체 지시 층 부재이며, 펜스 주입으로 충분히 개선된다."
  - "기계 검사 없이 지시문만으로 규범이 유지된다 — 열화는 관측 고리(lessons.md)로 감지."
  - "사고 제약 원문의 드리프트 0 상태가 작업 기간 유지된다."
  - "블라인드 비용(브레인스토밍 1건당 9~15회 호출 증가, 체감 대기 라운드당 1회분)은 감수 가능하다."

open_questions: []

context: "브레인스토밍 국면 1~4 완료 (2026-07-14). 결정 원장 23건(국면 1: 9건, 국면 2: 14건) 전부 확정, 재논의 1건 처리 완료. 검증은 블라인드 도그푸딩(TD·Ecosystem Analyst 상호 미노출 병렬)으로 수행 — 리스크 높음 0건. 상세는 phase1~3 파일과 설계 문서(persona-improvement.md)가 정본."
