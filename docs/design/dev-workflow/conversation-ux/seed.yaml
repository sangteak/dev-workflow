goal: "dev-workflow가 직접 진행하는 구간(BRAINSTORM/PLAN/COMPLETION + 세션 시작/컨텍스트 관리)의 대화 방식을 '하나씩 · 보이는 것만 · 쉬운 말 · 깨지지 않는 형식'으로 통일한다 — decision-flow.md를 결정+질문 공통 대화 규칙집으로 확장 (실사용 이슈 6건 + 백로그 1건 해소)."

constraints:
  - "다중 모델 (하드): 판단형 규칙 금지 — 기계적 트리거·화이트리스트·고정 문면만"
  - "형식 고정: 결정 📌·질문 ❓ 공통 스켈레톤 (괘선 ┌│└·마크다운 표 금지, 배경+선택지별 결과 1줄+💡 추천 줄 분리) — 설계 문서 §8 확정 문면"
  - "응답 원칙: 선택지까지 노출된 항목에만 답할 수 있다 — 하나씩 모드 다중 값은 첫 값만+안내, 선답의 모드 전환 자동 해석 금지 (명시적 전환 유지)"
  - "자가 응답 금지 — 선택지 생략은 고정 표현 화이트리스트 한정, 오판 시 즉시 소급 제시"
  - "브리핑·입력 초대 문면은 실제 응답 대기 시점에만 (첫 결정 직전, 라운드 선행 시 이후)"
  - "질문 기본 하나씩 + ❓ N/M 별개 카운트 — 정제는 유지, 노출만 순차 ('최대 2개' 규칙 대체)"
  - "초심자 언어 기본값 (트리거 불요) + ID 라벨 병기 + 공유 출력 형식 (구분 헤더 이모지·`-` 나열·빈 줄·`/` 금지·페르소나 개행)"
  - "로컬 화면 ~10개 신규 스켈레톤으로 개정 — §8 '문서 그대로 출력' 원칙 유지"
  - "decision-flow.md 한 파일 유지 (분리 부적합 판정) — 내부 3부 구성(결정/질문/공통)"
  - "개정 문면은 plan.md에 완성형 사전 확정 — 구현은 verbatim 치환만"
  - "부트스트랩 폴백 교체는 ~2.5KB 예산 내"

non_goals:
  - "DEVELOP/REVIEW(Superpowers 위임)의 대화 UX / 결정 확정 로직 재설계 / 새 상태 기계·큐 / 파일 분리 실행 / HANDOFF 전면 재설계 / 헤더 재설계 (별개 카운트 규정만 추가)"

success_criteria:
  - "REQ-001~013 (설계 문서 §3) — 전부 '문서에 해당 규범/고정 문면/예시가 존재한다' 형태로 검증 가능"
  - "게이트 대조 인벤토리: 개정된 로컬 화면 전수에서 화면 이름·선택지 수·0번 유무가 전후 동일"
  - "폴백 3점(decision-flow SSOT·orchestrator 폴백·부트스트랩) 문면 상호 무모순"

assumptions:
  - "신규 규범은 기존 decision-flow.md 절 구조에 편입 가능 (조사로 §별 개정 지점 30곳 확인 완료 — phase2 원장)"
  - "초심자 언어 준수도는 스켈레톤 구조 강제 + 실물 예시 모방으로 확보 — 도그푸딩 관측 대상"

open_questions: []

context: "2026-07-08 v1.13.0 실사용(G4 세션)에서 사용자가 스크린샷 6건으로 보고한 대화 UX 불편에서 출발. 본 브레인스토밍 자체가 신규 규범의 선적용 도그푸딩으로 진행됨 — 세션 중 실시간 형식 피드백 5건(추천 줄 분리, 구분 헤더+`-` 나열, `/` 금지, 페르소나 개행, 그룹 이모지)이 규범에 흡수됨. 상세: conversation-ux.md 및 phase1~3."
