# gate-effectiveness 시드 — Step B 확정본에 국면 2~4 변경분 반영 (직접 갱신 방식 선적용 — REQ-006)

goal: "게이트(사용자 확인 지점) 전체 목록 34행을 3단 예/아니오 결정 트리로 심사해 — 등급이 틀린 확인(커밋+푸시 결합)은 바로잡고, 형식만 남은 확인(digest 학습 게이트·과발동 라운드·시드 재투입)은 안전망과 함께 걷어낸다. 배칭 원안은 폐기 (게이트 실효성 정비로 재정의)."

constraints:
  - "배칭 금지 (하드) — 사용자 명시 불원 + conversation-ux '하나씩' 규범 충돌"
  - "conversation-ux 규범(스켈레톤·REQ-012 경계) 100% 정합 — 새 문면 요소 신설 금지"
  - "비가역 승인은 어떤 진행 모드에서도 생략 불가 (merge-to-domain 선례 계승)"
  - "판단형 규칙 금지 — 차단성 우려도 예/아니오 판별문으로 고정"
  - "제거·자동화마다 대체 안전망(사후 고지 1줄·기록·소급 수정) 동반 — 공통 포맷 1회 정의 + 스킬별 1줄 참조"
  - "개정 문면은 plan.md에 완성형 사전 확정 — 구현은 verbatim 치환만"
  - "구 독트린('생략할 수 없다'·'커밋+푸시' 계열) grep 전수 스윕 의무"
  - "업종 특화 어휘 지양 — 풀이로 대신하지 말고 일상어로 대체 (언어 규범 1줄 추가분)"

non_goals:
  - "배칭 UI / 게이트 수 줄이기 자체(제거 판정 0건) / 원안 '5회→2게이트'(폐기) / SemVer 일반 원칙 신설 / document-consolidation Mode 3(폐기 예정 — 심사 배제) / 스켈레톤 재정의 / 도메인 문서 갱신(도메인 머지 시점 수행)"

success_criteria:
  - "REQ-001~010 (설계 문서 §3) — 34행 심사 확정본 수록, 자동화 5건+안전망, 커밋/푸시 2단 분리+bootstrap 동기, digest 게이트 생략+고지+스윕, 라운드 포괄 정비(빈칸 행·판별문·조기 종료), 시드 직접 갱신, 잔존 HANDOFF 조건부, development-principles 신설 2절, 대화 규칙집 2줄, 검증 4종"
  - "게이트 전후 대조: 유지 22건은 화면·선택지 수·발동 조건 동일 재현, 처분 변경 12건은 설계 §4 표와 일치"
  - "드라이런 1회: 개정 문면만 읽는 신선 에이전트가 가상 마무리 시나리오에서 커밋 확인→푸시 확인 2단을 실제로 발동"

assumptions:
  - "자동화 5건의 고지 문면은 왕복을 만들지 않는다 (도그푸딩 관측 대상)"
  - "게이트 신설 체크리스트는 간접 트리거로 충분히 작동한다 (관측 대상)"
  - "merge-to-domain의 dry-run·문장 대조 검증이 digest 오추출의 안전망으로 충분하다 (조사 근거: 이중 안전망 실재)"

open_questions: []

context: "2026-07-09 로드맵 G5에서 출발. A-0 본질 질문에서 원안(배칭)의 전제가 낡음이 확인되어 '게이트 실효성 정비'로 재정의. 게이트 전체 목록 34행 원장화(phase1 §6 + phase2 §2 보정) → 3단 트리 기계 심사 → 사용자 결정 6건 + 국면 3 결정 1건(언어 규범). 상세: gate-effectiveness.md 및 phase1~3."
