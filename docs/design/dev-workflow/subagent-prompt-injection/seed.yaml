goal: >
  brainstorming/plan-stage/orchestrator 스킬의 서브에이전트 프롬프트 템플릿에서
  [X 전문] 플레이스홀더의 프레이밍을 전환하여 Ouroboros 에이전트 역할 정의의
  전문 주입 신뢰성을 향상시킨다.

constraints:
  - "수정 대상은 SKILL.md의 프롬프트 템플릿만 (코드 없는 플러그인)"
  - "외부 파일 참조(런타임 Read) 방식 유지 — Ouroboros 업데이트 자동 반영"
  - "Ouroboros 에이전트 .md 파일 자체 수정 불가 (외부 의존성)"
  - "기존 워크플로우 흐름(Phase 0~3) 변경 없음"
  - "에이전트 핵심 규칙 인라인화 금지 (동기화 비용 회피)"

non_goals:
  - "프로그래매틱 삽입 메커니즘 도입"
  - "100% 결정론적 주입 보장"
  - "Ouroboros 에이전트 파일 구조/내용 변경"

success_criteria:
  - "7개 기존 템플릿에 프레이밍 전환 패턴(⚠️ + === 구분자 + 명시적 부정 제약) 적용"
  - "Contrarian/Hacker 2개 신규 템플릿 작성 (Step C 맥락 반영)"
  - "피드백 루프 일반 규칙(83행)에 '수정·요약 없이 그대로 포함' 문구 추가"
  - "3개 스킬 파일(brainstorming, plan-stage, orchestrator) 전체에 동일 패턴 일관 적용"
  - "기존 Phase 0~3 흐름 정상 동작"

assumptions:
  - "2KB 수준의 verbatim 포함은 Claude의 능력 범위 안"
  - "프레이밍 전환으로 준수율이 유의미하게 향상 가능"
  - "Ouroboros 에이전트 .md 파일에 frontmatter 없음 — 전문 = 파일 전체"

open_questions: []

context: >
  dev-workflow는 코드 없는 문서 기반 Claude Code 플러그인.
  대안 C(프레이밍 전환) 확정. 외부 의존성 동기화 비용을 피하기 위해
  인라인화(대안 A)는 제외.
