goal: "관리자 슬래시 명령으로 트리거하여 여러 작업자의 complete 상태 feature 문서를 5단계 intelligent 알고리즘으로 domain.md SSOT에 의미 보존 방식으로 통합하는 머지 파이프라인을 구축한다."

constraints:
  - "Markdown 전용 플러그인 — 코드 변경 없이 스킬/명령/오케스트레이터 갱신만으로 구현"
  - "기존 dev-workflow 워크플로우(Brainstorm → Plan → Develop → Review → Completion)와 하위 호환 유지"
  - "관리자 단독 로컬 Claude Code 세션에서만 실행 (CI/CD/원격 자동화 X)"
  - "작업자는 domain.md를 직접 편집할 수 없다 — 관리자 머지 파이프라인만이 유일한 갱신 경로"
  - "intelligent merge 강제 — 단순 concat 머지 금지, 코드 직접 탐색은 보조 수단으로만 허용"
  - "사용자 질문 우선 원칙 — 분류 애매 시 사용자 결정으로 fallback (보수 원칙)"
  - "dry-run → 사용자 승인 → 적용 3단계 강제 (자동 수정 항목도 dry-run에 회계 형식으로 노출)"
  - "git 롤백 메커니즘에 위임 — 자체 롤백/스냅샷 구현 금지"
  - "concurrency 제어는 git native 메커니즘에 위임 — 별도 락 메커니즘 도입 금지"
  - "linter는 별도 도구 — 본 파이프라인 책임 범위 외"
  - "직렬화 정책: 카테고리 내 누적 base 직렬(git log main 머지 순서), 카테고리 간만 병렬"

non_goals:
  - "CI/CD 환경에서의 자동 머지 트리거"
  - "작업자가 domain.md를 직접 편집할 수 있는 경로 제공"
  - "코드와 문서 간 정합성을 검증하는 linter 구현"
  - "git 외 VCS(Mercurial/SVN 등) 지원 및 자체 롤백 메커니즘"
  - "사람 가독성 최우선 출력 포맷 (주 독자는 Claude Code)"
  - "concat 방식의 단순 머지 (intelligent merge 강제)"
  - "기존 도메인 문서 일괄 마이그레이션 (점진 보완 방식 채택)"
  - "merge_status frontmatter 도입 및 _archive 디렉토리 보존"
  - "작성자 통보 별도 메커니즘 (git log + 섹션 10 변경 이력으로 갈음)"
  - "2단계 게이트(ready-for-merge 별도 상태)"
  - "부분 머지(partial merge) 개념"

