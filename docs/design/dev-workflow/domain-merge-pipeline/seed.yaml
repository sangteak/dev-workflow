  - "실패 시 in-session resolution이 4지(Tech Lead 위임 / 직접 수정 / skip / abort)로 제시되며, skip된 feature 디렉토리는 보존되고 abort는 사용자 명시 요청 시에만 가능하다"
  - "머지 성공 후 feature 디렉토리가 통째로 삭제된다 (skip/abort 시 보존)"
  - "섹션 10 변경 이력은 완료 머지에 대해서만 자동 기록되며 skip/abort는 미기록"
  - "머지 후보가 없는 빈 상태에서는 한 줄 안내 출력 후 즉시 종료한다"
  - "머지 세션 종료 시 inline 요약(처리 건수/skip/abort)이 출력된다"
