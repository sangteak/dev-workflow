context: |
  # 배경

  dev-workflow는 Brainstorm → Plan → Develop → Review 흐름으로 feature 단위 설계 문서를 생성하지만, 여러 작업자가 같은 도메인에서 동시에 작업한 결과를 domain.md SSOT(Single Source of Truth)에 통합하는 표준화된 메커니즘이 없었다. 기존 document-consolidation 스킬은 feature 내부의 phase/plan 파일을 feature.md로 합치는 역할만 수행하고, 카테고리(도메인) 수준의 머지는 수동 작업으로 남아 있었다.

  # 동기

  - 여러 작업자가 병렬로 작업한 결과(feature 단위 complete 상태)를 도메인 수준에서 의미 보존 방식으로 통합해야 함
  - 단순 concat이 아닌 ID 정합성 / 의미 충돌 / 의존성 맵 재정의 / 기존 결정 무효화를 인지하는 intelligent merge가 필요
  - 관리자 한 명이 통제하는 안전한 파이프라인 — 작업자는 domain.md 직접 편집 불가
  - 페르소나 피드백(🏛️ Architect 리뷰)과 dry-run → 승인 → 적용의 안전 절차를 강제

  # 핵심 설계 요약

  ## 스킬 / 명령 구조
  - 신규 스킬: `merge-to-domain` (skills/merge-to-domain/SKILL.md)
  - 신규 명령: `/dev-workflow:merge-to-domain` (commands/merge-to-domain.md)
  - 기존 `document-consolidation`은 feature 통합 책임만 유지 — 도메인 머지 로직 제거
  - `workflow-orchestrator`의 Completion Protocol이 신규 파이프라인을 호출하도록 갱신

  ## 5단계 머지 알고리즘
  1. **domain 학습** → ID 기반 structured digest(YAML) 산출. 토큰 ≥ 80K 시 섹션 단위 분할 학습 fallback
  2. **feature 학습** → 각 feature 문서를 동일 형식 structured digest로 변환
  3. **머지 계획 수립** → 외부 분류 규칙으로 자동 수정 / 사용자 결정 분류 → 🏛️ Architect 피드백 루프(1~3 라운드). 분류 애매 시 사용자 결정으로 fallback
  4. **적용** → dry-run plan(자동 수정 포함 회계 형식: 수정 전/후 + 참조 갱신 위치) → 사용자 승인 → domain.md 수정 + 섹션 10 변경 이력 자동 기록
  5. **검증** → 🔧 Tech Lead / 📋 PM 담당 (Architect와 역할 분리)

  ## 분류 규칙 (외부 규칙 문서로 분리)
  - **자동 수정**: ID renumbering, 헤더 동일 시 표 형식 통일, 충돌 없는 append
  - **사용자 결정**: 새 섹션 신설, 의미 충돌, 기존 결정 무효화, 의존성 맵 재정의
  - **애매 시**: 사용자 결정으로 fallback (보수 원칙)

  ## 안전 절차
  - dry-run은 자동 수정 항목도 회계 형식으로 노출하여 투명성 확보
  - 실패 시 in-session resolution: Tech Lead 위임 / 직접 수정 / skip / abort 4지 선택
  - skip된 feature 디렉토리는 보존, abort는 사용자 명시 요청 시에만
  - 머지 성공 후 feature 디렉토리 통째 삭제, 섹션 10 변경 이력 자동 기록(완료 건만)

  ## 실행 모드 (복합 임계값)
  - feature<3 AND tokens<20K → 순차
  - feature≥5 OR tokens>50K → 병렬
  - 그 외 → 사용자 3지 선택 (자동위임 기본 highlight)
  - 토큰 추정: bytes/3.5 (MERGE_TOKEN_DIVISOR로 조정)
  - 풀 크기: 기본 3, 상한 5 (MERGE_POOL_SIZE로 조정)
  - 사용자 결정 큐 FIFO 직렬화, 출력 시작 순서 직렬화

  ## 직렬화 정책
  - 카테고리 내: git log main 머지 순서에 따라 누적 base를 직렬로 빌드
  - 카테고리 간: 병렬 허용 (서로 다른 domain.md는 독립)

  ## 옵션 플래그
  - `--no-review`: Architect 피드백 차단 (긴급용)
  - `--review-merge=N`: 라운드 수 정확값 강제 (디버깅용)
  - `--auto`: 자동 수정 사후 확인 생략 (사용자 결정 항목은 여전히 질문)
  - 자동 모드 키워드 인식 + 1차 confirm
  - 사전 승인은 세션 1회 동안 영속

  ## Concurrency
  - git native 메커니즘(staging, branch, log)에 위임
  - 별도 락 메커니즘 도입 안 함

  ## 부수 동작
  - 머지 후보 빈 상태 → 한 줄 출력 후 종료
  - 머지 세션 종료 시 inline 요약 출력 (처리/skip/abort 건수)
  - 단일 `complete` 상태가 유일한 머지 후보 게이트 (2단계 게이트 / merge_status frontmatter / _archive 모두 도입 X)

  # 통합 지점
  - 기존 `document-consolidation`, `workflow-orchestrator`와 명확히 책임 분리
  - 페르소나 시스템(`persona-resolution`)의 🏛️ Architect / 🔧 Tech Lead / 📋 PM 활용
  - git 환경에서 동작하며 git 외 VCS는 지원 안 함
