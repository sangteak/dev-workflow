  - "기존 document-consolidation 스킬은 feature 문서 통합만 담당하며 domain 머지 로직이 완전히 제거된다"
  - "workflow-orchestrator의 Completion Protocol이 신규 머지 파이프라인 호출 경로로 갱신된다"
